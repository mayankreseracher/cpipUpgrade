name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v4
        with:
          go-version: '1.22'
          cache: false

      - name: Clear Go module cache
        run: go clean -modcache

      - name: Tidy Dependencies
        run: go mod tidy
        working-directory: . 

      - name: Build Server
        run: go build -v ./cmd/server

      - name: Test Suite
        run: go test -v ./...