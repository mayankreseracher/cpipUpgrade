name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  check:
    name: Check Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: false
      
      - name: Go mod tidy
        run: go mod tidy
      
      - name: Check fmt
        run: go fmt ./...
      
      - name: Check vet
        run: go vet ./...
      
      - name: Build
        run: go build -v ./cmd/server 2>&1 || echo "Build output above"
