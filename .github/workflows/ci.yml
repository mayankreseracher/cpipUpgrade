name: Debug Build

on:
  push:
    branches: [main, master, develop]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: false

      - name: List all Go files
        run: |
          echo "=== All Go files in project ==="
          find . -name "*.go" -type f

      - name: Check cmd/server directory
        run: |
          echo "=== Contents of cmd/server ==="
          ls -la cmd/server/ || echo "Directory not found"

      - name: Attempt to build with full error output
        run: |
          echo "=== Attempting build ==="
          go build -v ./cmd/server 2>&1
          echo "Exit code: $?"
