name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  diagnose:
    name: Diagnose & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: false
      
      - name: Check Go version
        run: go version
      
      - name: List files
        run: find . -name "*.go" -type f | head -20
      
      - name: Download dependencies
        run: go mod download
      
      - name: Verify dependencies
        run: go mod verify
      
      - name: Show go.mod
        run: cat go.mod
      
      - name: Build with verbose output
        run: go build -v ./cmd/server

  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: false
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          skip-cache: true
          args: --timeout=10m
        continue-on-error: true
