name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: false

      - name: Tidy Dependencies
        run: go mod tidy
        # If your go.mod is in a subfolder (e.g., cmd/server), change '.' to './cmd/server'
        working-directory: . 

      - name: Build Server
        run: go build -v ./cmd/server
        # Removed "|| true" so that if there is a real syntax error, the logs will show it clearly

      - name: Test Suite
        run: go test -v ./...
        
